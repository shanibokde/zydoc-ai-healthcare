<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap');

  .dashboard-cards-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 0 4px;
  }

  .stat-card {
    border-radius: 16px;
    padding: 28px 26px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    min-height: 150px;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    width: 130px; height: 130px;
    border-radius: 50%;
    right: -30px; bottom: -40px;
    background: rgba(255,255,255,0.08);
  }

  .stat-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.18);
  }

  .stat-card.card-doctor {
    background: linear-gradient(135deg, #1a7f5a 0%, #0d9e6e 100%);
    box-shadow: 0 8px 24px rgba(26,127,90,0.3);
  }

  .stat-card.card-symptom {
    background: linear-gradient(135deg, #1a56a0 0%, #2979d8 100%);
    box-shadow: 0 8px 24px rgba(26,86,160,0.3);
  }

  .stat-card.card-date {
    background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
    box-shadow: 0 8px 24px rgba(124,58,237,0.3);
  }

  .stat-card-content { flex: 1; z-index: 1; }

  .stat-card-label {
    font-family: 'Sora', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    margin-bottom: 8px;
  }

  .stat-card-value {
    font-family: 'Sora', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .stat-card-sub {
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .stat-card-icon {
    font-size: 2.4rem;
    color: rgba(255,255,255,0.18);
    z-index: 1;
    margin-left: 10px;
  }

  .divider-line {
    width: 28px;
    height: 2px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
    margin: 10px 0;
  }

  @media (max-width: 768px) {
    .dashboard-cards-row { grid-template-columns: 1fr; }
  }
</style>

<div class="dashboard-cards-row">
  <div class="stat-card card-doctor">
    <div class="stat-card-content">
      <div class="stat-card-label">Assigned Doctor</div>
      <div class="stat-card-value">{{doctorName}}</div>
      <div class="divider-line"></div>
      <div class="stat-card-sub">Department</div>
      <div class="stat-card-value" style="font-size:15px;">{{doctorDepartment}}</div>
    </div>
    <div class="stat-card-icon"><i class="fa fa-user-md"></i></div>
  </div>

  <div class="stat-card card-symptom">
    <div class="stat-card-content">
      <div class="stat-card-label">Reported Symptoms</div>
      <div class="stat-card-value" style="font-size:16px; line-height:1.5;">{{symptoms}}</div>
    </div>
    <div class="stat-card-icon"><i class="fa fa-heartbeat"></i></div>
  </div>

  <div class="stat-card card-date">
    <div class="stat-card-content">
      <div class="stat-card-label">Admit Date</div>
      <div class="stat-card-value">{{admitDate}}</div>
      <div class="divider-line"></div>
      <div class="stat-card-sub">Hospital Stay</div>
    </div>
    <div class="stat-card-icon"><i class="fa fa-calendar-check-o"></i></div>
  </div>
</div>
