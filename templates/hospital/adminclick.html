{% extends 'hospital/homebase.html' %}
{% block content %}

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap');

  .admin-hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f1c2e 0%, #1a2e4a 50%, #0d2137 100%);
    position: relative;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }

  .admin-hero::before {
    content: '';
    position: absolute;
    top: -100px; right: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(0,200,150,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }

  .admin-hero::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -80px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(59,125,216,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }

  .hero-card {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 56px 52px;
    max-width: 520px;
    width: 100%;
    text-align: center;
    position: relative;
    z-index: 1;
    box-shadow: 0 24px 60px rgba(0,0,0,0.4);
  }

  .hero-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, rgba(0,200,150,0.2), rgba(0,200,150,0.05));
    border: 1px solid rgba(0,200,150,0.3);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    color: #00c896;
    margin: 0 auto 28px;
    box-shadow: 0 8px 24px rgba(0,200,150,0.15);
  }

  .hero-card h1 {
    font-size: 2rem;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
  }

  .hero-card p.lead {
    color: rgba(255,255,255,0.55);
    font-size: 0.95rem;
    line-height: 1.7;
    margin-bottom: 36px;
    font-weight: 400;
  }

  .hero-divider {
    width: 40px; height: 3px;
    background: var(--accent, #00c896);
    border-radius: 4px;
    margin: 0 auto 28px;
  }

  .btn-group-hero {
    display: flex;
    gap: 14px;
    justify-content: center;
  }

  .btn-hero {
    padding: 13px 32px;
    border-radius: 12px;
    font-size: 0.88rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: all 0.25s ease;
    text-decoration: none !important;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: none;
  }

  .btn-hero-outline {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.2) !important;
    color: rgba(255,255,255,0.75) !important;
  }

  .btn-hero-outline:hover {
    border-color: rgba(255,255,255,0.5) !important;
    background: rgba(255,255,255,0.06);
    color: #fff !important;
    transform: translateY(-2px);
  }

  .btn-hero-solid {
    background: #00c896;
    color: #fff !important;
    box-shadow: 0 4px 18px rgba(0,200,150,0.35);
  }

  .btn-hero-solid:hover {
    background: #00b385;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,200,150,0.4);
    color: #fff !important;
  }

  .hero-footer {
    margin-top: 30px;
    padding-top: 22px;
    border-top: 1px solid rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.25);
    font-size: 0.78rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .hero-footer i { color: rgba(0,200,150,0.5); font-size: 10px; }
</style>

<div class="admin-hero">
  <div class="hero-card">
    <div class="hero-icon">
      <i class="fas fa-user-shield"></i>
    </div>
    <h1>Hello, Admin</h1>
    <div class="hero-divider"></div>
    <p class="lead">Welcome to the ZyDoc Administration Portal. Manage your hospital efficiency and healthcare staff in one place.</p>

    <div class="btn-group-hero">
      <a class="btn-hero btn-hero-outline" href="/adminsignup">
        <i class="fas fa-user-plus"></i> Register
      </a>
      <a class="btn-hero btn-hero-solid" href="/adminlogin">
        <i class="fas fa-sign-in-alt"></i> Login Now
      </a>
    </div>

    <div class="hero-footer">
      <i class="fas fa-shield-alt"></i>
      Secure Access Required
    </div>
  </div>
</div>

{% endblock content %}
