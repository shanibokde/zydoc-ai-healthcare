{% extends "hospital/doctor_base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-success text-white">
            <h3 class="mb-0"><i class="fas fa-upload"></i> Upload Lab Report for {{patient.get_name}}</h3>
        </div>
        <div class="card-body">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="form-group">
                    <label>Report Type</label>
                    <select name="report_type" class="form-control" required>
                        <option value="Blood Test">Blood Test</option>
                        <option value="X-Ray">X-Ray</option>
                        <option value="MRI">MRI</option>
                        <option value="Urine Test">Urine Test</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" name="description" class="form-control" placeholder="e.g. Chest X-Ray Results">
                </div>
                <div class="form-group">
                    <label>Select File (PDF or Image)</label>
                    <input type="file" name="report_file" class="form-control-file" required>
                </div>
                <div class="form-group">
                    <label>Doctor's Interpretation/Notes</label>
                    <textarea name="notes" class="form-control" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-success">Save Report</button>
                <a href="{% url 'view-patient-history' patient.id %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
